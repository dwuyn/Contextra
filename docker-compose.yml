services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contextra}
      POSTGRES_USER: ${POSTGRES_USER:-contextra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contextra}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  migrate:
    image: ${MIGRATE_IMAGE:-ghcr.io/dwuyn/contextra-migrate:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-contextra}:${POSTGRES_PASSWORD:-contextra}@postgres:5432/${POSTGRES_DB:-contextra}?schema=public
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-key.json
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./google-key.json:/app/google-key.json:ro
    restart: "no"

  next-app:
    image: ${APP_IMAGE:-ghcr.io/dwuyn/contextra-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-contextra}:${POSTGRES_PASSWORD:-contextra}@postgres:5432/${POSTGRES_DB:-contextra}?schema=public
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-key.json
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - avatar-data:/app/data
      - ./google-key.json:/app/google-key.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  continuity-worker:
    image: ${WORKER_IMAGE:-ghcr.io/dwuyn/contextra-worker:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-runner
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-contextra}:${POSTGRES_PASSWORD:-contextra}@postgres:5432/${POSTGRES_DB:-contextra}?schema=public
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-key.json
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./google-key.json:/app/google-key.json:ro
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      next-app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres-data:
  avatar-data:
