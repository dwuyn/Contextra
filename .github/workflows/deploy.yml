name: Deploy Contextra

on:
  push:
    branches:
      - main

env:
  APP_IMAGE: ghcr.io/dwuyn/contextra-app
  MIGRATE_IMAGE: ghcr.io/dwuyn/contextra-migrate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE }}:latest
            ${{ env.MIGRATE_IMAGE }}:${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /home/dwyn/Contextra

            git fetch --depth=1 origin main
            git checkout --force ${{ github.sha }}

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dwuyn --password-stdin

            export APP_IMAGE="${{ env.APP_IMAGE }}:${{ github.sha }}"
            export MIGRATE_IMAGE="${{ env.MIGRATE_IMAGE }}:${{ github.sha }}"

            docker compose pull migrate next-app

            docker compose up -d postgres

            docker compose run --rm migrate

            docker compose up -d next-app

            container_id="$(docker compose ps -q next-app)"
            if [ -z "$container_id" ]; then
              docker compose logs next-app
              exit 1
            fi

            attempts=0

            while [ "$attempts" -lt 30 ]; do
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"

              if [ "$health_status" = "healthy" ] || [ "$health_status" = "running" ]; then
                break
              fi

              if [ "$health_status" = "unhealthy" ] || [ "$health_status" = "exited" ]; then
                docker compose logs next-app
                exit 1
              fi

              attempts=$((attempts + 1))
              sleep 5
            done

            final_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"

            if [ "$final_status" != "healthy" ] && [ "$final_status" != "running" ]; then
              docker compose logs next-app
              exit 1
            fi

            docker image prune -f
