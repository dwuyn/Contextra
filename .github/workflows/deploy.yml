name: Deploy Contextra

on:
  push:
    branches:
      - main

env:
  APP_IMAGE: ghcr.io/dwuyn/contextra-app
  MIGRATE_IMAGE: ghcr.io/dwuyn/contextra-migrate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE }}:latest
            ${{ env.MIGRATE_IMAGE }}:${{ github.sha }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/dwyn/Contextra

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u dwuyn --password-stdin

            docker compose pull migrate next-app

            docker compose up -d postgres

            docker compose run --rm migrate

            docker compose up -d next-app

            docker image prune -f
